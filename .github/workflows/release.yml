name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-asset:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_fleet.txt pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm fleet_simulator.spec

      - name: Create release package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $packageDir = "CDI-Fleet-Simulator-$version-Windows"
          if (Test-Path $packageDir) { Remove-Item -Recurse -Force $packageDir }
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item "dist\fleet_simulator\*" $packageDir -Recurse -Force
          Copy-Item "devices_config.yaml" $packageDir -Force
          Copy-Item "README.md" $packageDir -Force
          Copy-Item "FLEET_SIMULATOR_SUMMARY.md" $packageDir -Force
          if (Test-Path "FLEET_IMPROVEMENTS_v2.md") { Copy-Item "FLEET_IMPROVEMENTS_v2.md" $packageDir -Force }
          $notesFile = "RELEASE_NOTES_$version.md"
          if (Test-Path $notesFile) { Copy-Item $notesFile $packageDir -Force }
          Compress-Archive -Path "$packageDir\*" -DestinationPath "$packageDir.zip" -Force

      - name: Upload packaged zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: CDI-Fleet-Simulator-${{ github.ref_name }}-Windows.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: build-windows-asset

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged zip
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: release-assets

      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          notes_file="RELEASE_NOTES_${tag}.md"

          if [[ -f "$notes_file" ]]; then
            echo "Using $notes_file"
            {
              echo 'body<<EOF'
              cat "$notes_file"
              echo
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<EOF'
              echo "# ${tag}"
              echo
              echo "Release created from tag ${tag}."
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CDI Fleet Simulator - ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            release-assets/*.zip
          draft: false
          prerelease: false
