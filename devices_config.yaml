# ─────────────────────────────────────────────────────────────────────────────
# devices_config.yaml  —  CDI Fleet Simulator Configuration
#
# Edit THIS file to change devices, parameters, profiles, or tick values
# without touching any Python code.
#
# Sections:
#   server          → gRPC target address + mTLS certificate paths
#   param_catalog   → Master list of all CDI parameters with metadata
#   profiles        → Named parameter sets (selected for ProfileMetadata)
#   devices         → 6 simulated CDI Core devices with state & data
# ─────────────────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════════════════════
# SERVER CONNECTION
# ═══════════════════════════════════════════════════════════════════════════════
server:
  host: "10.124.204.10" # "10.124.204.10" #"192.168.29.167"
  port: 9090
  tls:
    enabled: true
    # Relative to user home, or absolute path
    cert_dir: "~/Downloads/certs 1"
    ca_cert: "ca.crt"
    client_cert: "client.crt"
    client_key: "client-pkcs8.key"
    server_cert: "server.crt"
    # Optional: set only when target host does not match cert SAN.
    # Example: connecting to IP but cert has DNS SAN "localhost"
    server_name_override: "localhost"
    # Keepalive is OFF by default to avoid server GOAWAY("too_many_pings").
    # Uncomment only if your server requires keepalive and allows frequent pings.
    # keepalive_time_ms: 300000
    # keepalive_timeout_ms: 20000
    # keepalive_permit_without_calls: false
    # Set false to fall back to insecure channel (dev/testing)
    # When enabled=false, cert files are ignored

# ═══════════════════════════════════════════════════════════════════════════════
# PARAMETER CATALOG
# ═══════════════════════════════════════════════════════════════════════════════
# Master definition for every parameter that any profile can reference.
# Key = param_id (uint32), matches CdiParameterIds.h
#
# Fields:
#   name               → ParamMetadata.param_name
#   unit               → ParamMetadata.unit
#   source_personality → ParamMetadata.source_device_personality
#   alarm_limit        → AlarmLimit { present, low, high }
#   range              → ParamRange { present, display_low/high, operating_low/high }
