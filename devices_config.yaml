# ═══════════════════════════════════════════════════════════════════════════════
# PROFILES  —  Named parameter-set presets
# ═══════════════════════════════════════════════════════════════════════════════
# Each profile specifies:
#   do2i_threshold  → int mL/min/m2 (sent in ProfileMetadata header)
#   manual_hgb      → float g/dL
#   manual_so2      → int %
#   flow_source     → string (Flow_Red | Flow_Blue | Manual | etc.)
#   param_ids       → list of param_id from catalog (selected=true)
# ─────────────────────────────────────────────────────────────────────────────
profiles:
  full_bypass:
    do2i_threshold: 280
    manual_hgb: 12.5
    manual_so2: 65
    flow_source: "Flow_Red"
    param_ids: [9, 42, 49, 50, 55, 60, 70, 71, 72, 73, 75, 89]

  arterial_venous:
    do2i_threshold: 300
    manual_hgb: 13.0
    manual_so2: 70
    flow_source: "Flow_Red"
    param_ids: [1, 2, 3, 9, 42, 43, 16, 17, 49, 50, 55]

  oxygen_delivery:
    do2i_threshold: 260
    manual_hgb: 11.0
    manual_so2: 60
    flow_source: "Flow_Blue"
    param_ids: [42, 49, 50, 55, 70, 71, 72, 73, 75, 89]

  cerebral_monitoring:
    do2i_threshold: 280
    manual_hgb: 12.0
    manual_so2: 65
    flow_source: "Flow_Red"
    param_ids: [42, 50, 55, 60, 61, 71, 75, 89]

  minimal:
    do2i_threshold: 300
    manual_hgb: 14.0
    manual_so2: 72
    flow_source: "Flow_Red"
    param_ids: [42, 50, 55, 71, 75]


